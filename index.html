<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CyberSafe Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>CyberSafe Challenge</h1>
    <p>Decide FAST: Is it SAFE or a SCAM?</p>
  </header>

  <main>
    <div id="game-box">
      <div id="message-box">Press Start to Begin!</div>

      <div id="buttons">
        <button id="safe-btn">SAFE</button>
        <button id="scam-btn">SCAM</button>
      </div>

      <div id="scoreboard">
        <p>Score: <span id="score">0</span></p>
        <p>Time Left: <span id="timer">30</span>s</p>
      </div>

      <button id="start-btn">Start Game</button>
      <p id="feedback"></p>
    </div>
  </main>

  <footer>
    <p>Created for End‑User Security Awareness Training</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
